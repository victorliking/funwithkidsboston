name: Auto Generate Blog Post

on:
  schedule:
    # UTC 14:00 = EST 9:00 AM
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check queue size and replenish if needed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          QUEUE_SIZE=$(node -e "const q=JSON.parse(require('fs').readFileSync('scripts/post-queue.json','utf-8')); const t=JSON.parse(require('fs').readFileSync('scripts/queue-tracker.json','utf-8')); console.log(q.length - t.current)")
          echo "Queue remaining: $QUEUE_SIZE"
          if [ "$QUEUE_SIZE" -lt 5 ]; then
            echo "Queue running low — running keyword research..."
            node scripts/keyword-research.js
          fi

      - name: Generate and publish post via content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/content-pipeline.js