name: Auto Generate Blog Post

on:
  schedule:
    # UTC 14:00 = EST 9:00 AM
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Generate post via content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/content-pipeline.js

      - name: Commit and push
        run: |
          git add src/content/blog/
          git add scripts/queue-tracker.json
          git status
          git commit -m "add: auto-generated blog post [skip ci]" || echo "Nothing to commit"
          git push || echo "Nothing to push"